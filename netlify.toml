# Configuração de deploy para Netlify
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Comando executado pelo Netlify para gerar o site
  command = "npm run build"
  # Pasta com os arquivos estáticos prontos para publicar
  publish = "dist"

[build.environment]
  # Versão do Node usada no build (Vite 6 exige Node 18+; 22 é LTS recomendado)
  NODE_VERSION = "22"

# Cabeçalhos de segurança e cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    # Arquivos do Vite já vêm com hash no nome -> cache agressivo
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Fallback de SPA: qualquer rota desconhecida volta para o index.html,
# necessário para /politica-de-privacidade funcionar com refresh/acesso direto.
# A regra 200 (rewrite, não redirect) mantém a URL e carrega o React Router manual.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
